name: CI

on:
  push:
  pull_request:

# Cancel a previous in-progress run for the same branch/PR when a newer commit
# arrives, so every commit is tested without piling up redundant runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      # Build-time-only placeholders so prisma generate / next build can load
      # config + server modules without a real database.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      AUTH_SECRET: "ci-secret"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
